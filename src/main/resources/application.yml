spring:
  application:
    name: FakeCommerce
  datasource:
    url: jdbc:mysql://localhost:3306/fakecommerce
    username: root
    password: ''
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

  redis:
    host: localhost
    port: 6379